interface:
  display_name: "Java Migration"
  short_description: "Single self-contained skill for Java migration strategy and execution"
  default_prompt: "Use $java-migration as the self-contained entry skill for this repository. Treat `java-migration/SKILL.md` as the reusable operating contract of the installed skill, and `docs/java-migration/PLAN.md` as the live repository-specific migration plan. Infer the operating mode from persisted state, use the bundled bootstrap and automation helpers, bootstrap `docs/java-migration` only when needed, keep a strict context budget with handoff at 40% and hard ceiling at 50%, and update the repository plan, handoff, and state before ending the session."
